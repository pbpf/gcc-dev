name: Test GCC 11 offline install (CentOS 7)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: centos:7

    steps:
    - uses: actions/checkout@v7

    - name: Install system deps
      run: |
        yum install -y which wget glibc-devel glibc-headers kernel-headers
        cat /etc/redhat-release

    - name: Download RPMs from CentOS vault
      run: |
        mkdir -p rpms/all
        BASE="https://vault.centos.org/7.9.2009"
        SCL="$BASE/sclo/x86_64/rh/Packages"
        OS="$BASE/os/x86_64/Packages"
        curl -sL "$BASE/sclo/x86_64/rh/repodata/repomd.xml" -o /dev/null || \
          { echo "vault.centos.org unreachable"; exit 1; }
        echo "vault.centos.org reachable, downloading..."

        # Base deps
        for pkg in \
          scl-utils-20130529-19.el7.x86_64.rpm \
          scl-utils-build-20130529-19.el7.x86_64.rpm \
          gmp-6.0.0-15.el7.x86_64.rpm \
          mpfr-3.1.1-4.el7.x86_64.rpm \
          libmpc-1.0.1-3.el7.x86_64.rpm \
          make-3.82-24.el7.x86_64.rpm; do
          echo "  downloading $pkg ..."
          curl -sL "$OS/$pkg" -o "rpms/all/$pkg" &
        done
        wait

        # SCL repo config
        for pkg in \
          centos-release-scl-2-3.el7.centos.noarch.rpm \
          centos-release-scl-rh-2-3.el7.centos.noarch.rpm; do
          echo "  downloading $pkg ..."
          curl -sL "$BASE/extras/x86_64/Packages/$pkg" -o "rpms/all/$pkg" &
        done
        wait

        # devtoolset-11 core
        for pkg in \
          devtoolset-11-runtime-11.1-2.el7.x86_64.rpm \
          devtoolset-11-binutils-2.36.1-1.el7.2.x86_64.rpm \
          devtoolset-11-gcc-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libstdc++-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-gcc-c++-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-make-4.3-1.el7.x86_64.rpm; do
          echo "  downloading $pkg ..."
          curl -sL "$SCL/d/$pkg" -o "rpms/all/$pkg" &
        done
        wait

        # runtime libs
        for pkg in \
          libasan6-11.2.1-9.1.el7.x86_64.rpm \
          libubsan1-11.2.1-9.1.el7.x86_64.rpm \
          liblsan-11.2.1-9.1.el7.x86_64.rpm \
          libtsan-11.2.1-9.1.el7.x86_64.rpm; do
          echo "  downloading $pkg ..."
          curl -sL "$SCL/l/$pkg" -o "rpms/all/$pkg" &
        done
        wait

        # extra devel pkgs
        for pkg in \
          devtoolset-11-libasan-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libubsan-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-liblsan-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libtsan-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libatomic-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libitm-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libquadmath-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-gcc-gdb-plugin-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-gcc-gfortran-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-gcc-plugin-devel-11.2.1-9.1.el7.x86_64.rpm; do
          echo "  downloading $pkg ..."
          curl -sL "$SCL/d/$pkg" -o "rpms/all/$pkg" &
        done
        wait

        echo "=== Download complete ==="
        ls -lh rpms/all/*.rpm | wc -l
        du -sh rpms/all

    - name: Run offline GCC 11 install script
      run: bash install_gcc11.sh

    - name: Verify GCC 11 installation
      run: |
        echo "=== Paths ==="
        ls -la /opt/rh/devtoolset-11/root/usr/bin/gcc
        ls -la /usr/local/bin/gcc
        echo "=== Version ==="
        /opt/rh/devtoolset-11/root/usr/bin/gcc --version
        /usr/local/bin/gcc --version

    - name: Test C11 compilation
      run: |
        printf '#include <stdio.h>\nint main(void) {\n    printf("C11: OK\\n");\n    return 0;\n}\n' > /tmp/test_c.c
        /opt/rh/devtoolset-11/root/usr/bin/gcc -std=c11 -o /tmp/test_c /tmp/test_c.c
        /tmp/test_c

    - name: Test C++11 compilation
      run: |
        printf '#include <iostream>\nint main() {\n    std::cout << "C++11: OK" << std::endl;\n    return 0;\n}\n' > /tmp/test_cpp11.cpp
        /opt/rh/devtoolset-11/root/usr/bin/g++ -std=c++11 -o /tmp/test_cpp11 /tmp/test_cpp11.cpp
        /tmp/test_cpp11

    - name: Test C++17 compilation
      run: |
        printf '#include <iostream>\n#include <string_view>\nint main() {\n    constexpr std::string_view msg = "C++17: OK";\n    std::cout << msg << std::endl;\n    return 0;\n}\n' > /tmp/test_cpp17.cpp
        /opt/rh/devtoolset-11/root/usr/bin/g++ -std=c++17 -o /tmp/test_cpp17 /tmp/test_cpp17.cpp
        /tmp/test_cpp17

    - name: Test C++20 compilation with concepts
      run: |
        printf '#include <iostream>\n#include <concepts>\ntemplate<typename T> requires std::integral<T>\nT add(T a, T b) { return a + b; }\nint main() {\n    std::cout << "C++20 concepts: " << add(3, 4) << std::endl;\n    return 0;\n}\n' > /tmp/test_cpp20.cpp
        /opt/rh/devtoolset-11/root/usr/bin/g++ -std=c++20 -o /tmp/test_cpp20 /tmp/test_cpp20.cpp
        /tmp/test_cpp20

    - name: List installed devtoolset-11 RPMs
      run: rpm -qa | grep devtoolset-11 | sort

    - name: Show /usr/local/bin symlinks
      run: ls -la /usr/local/bin/ | grep -E 'gcc|g\+\+|c\+\+|gcov' || echo "no symlinks"
