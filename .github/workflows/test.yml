name: Test GCC 11 + CUDA 12.4 offline install (CentOS 7)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Build centos:7 test image (cmake 3.31 + git)
      run: |
        echo "FROM centos:7" > Dockerfile.test
        echo "RUN sed -i -e 's|^mirrorlist=|#mirrorlist=|' -e 's|^#baseurl=http://mirror.centos.org/centos|baseurl=https://vault.centos.org/centos|' /etc/yum.repos.d/CentOS-Base.repo && \
              yum install -y which wget glibc-devel glibc-headers kernel-headers git && \
              wget -q https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-linux-x86_64.tar.gz -O /tmp/cmake.tar.gz && \
              tar xzf /tmp/cmake.tar.gz -C /usr/local --strip=1 && \
              rm -f /tmp/cmake.tar.gz" >> Dockerfile.test
        docker build -t centos7-test -f Dockerfile.test .

    - name: Download all RPMs
      run: |
        mkdir -p rpms/all
        VLT="https://vault.centos.org/7.9.2009"
        SCL="$VLT/sclo/x86_64/rh/Packages"
        OS="$VLT/os/x86_64/Packages"
        EX="$VLT/extras/x86_64/Packages"
        CUDA="https://developer.download.nvidia.cn/compute/cuda/repos/rhel7/x86_64"

        curl -sL "$VLT/sclo/x86_64/rh/repodata/repomd.xml" -o /dev/null || exit 1

        dl() { curl -sL "$1" -o "rpms/all/$2" & }

        # Base OS
        for p in scl-utils-20130529-19.el7.x86_64.rpm scl-utils-build-20130529-19.el7.x86_64.rpm \
                 gmp-6.0.0-15.el7.x86_64.rpm mpfr-3.1.1-4.el7.x86_64.rpm \
                 libmpc-1.0.1-3.el7.x86_64.rpm make-3.82-24.el7.x86_64.rpm; do
          dl "$OS/$p" "$p"
        done
        for p in centos-release-scl-2-3.el7.centos.noarch.rpm \
                 centos-release-scl-rh-2-3.el7.centos.noarch.rpm; do
          dl "$EX/$p" "$p"
        done
        for p in devtoolset-11-runtime-11.1-2.el7.x86_64.rpm \
                 devtoolset-11-binutils-2.36.1-1.el7.2.x86_64.rpm \
                 devtoolset-11-gcc-11.2.1-9.1.el7.x86_64.rpm \
                 devtoolset-11-libstdc++-devel-11.2.1-9.1.el7.x86_64.rpm \
                 devtoolset-11-gcc-c++-11.2.1-9.1.el7.x86_64.rpm \
                 devtoolset-11-make-4.3-1.el7.x86_64.rpm; do
          dl "$SCL/d/$p" "$p"
        done
        for p in libasan6-11.2.1-9.1.el7.x86_64.rpm libubsan1-11.2.1-9.1.el7.x86_64.rpm \
                 liblsan-11.2.1-9.1.el7.x86_64.rpm libtsan-11.2.1-9.1.el7.x86_64.rpm; do
          dl "$SCL/l/$p" "$p"
        done
        for p in devtoolset-11-libasan-devel-11.2.1-9.1.el7.x86_64.rpm \
                 devtoolset-11-libubsan-devel-11.2.1-9.1.el7.x86_64.rpm \
                 devtoolset-11-liblsan-devel-11.2.1-9.1.el7.x86_64.rpm \
                 devtoolset-11-libtsan-devel-11.2.1-9.1.el7.x86_64.rpm \
                 devtoolset-11-libatomic-devel-11.2.1-9.1.el7.x86_64.rpm \
                 devtoolset-11-libitm-devel-11.2.1-9.1.el7.x86_64.rpm \
                 devtoolset-11-libquadmath-devel-11.2.1-9.1.el7.x86_64.rpm; do
          dl "$SCL/d/$p" "$p"
        done

        # CUDA 12.4 nvcc toolchain
        for p in cuda-compiler-12-4-12.4.1-1.x86_64.rpm \
                 cuda-nvcc-12-4-12.4.131-1.x86_64.rpm \
                 cuda-crt-12-4-12.4.131-1.x86_64.rpm \
                 cuda-nvvm-12-4-12.4.131-1.x86_64.rpm \
                 cuda-cudart-12-4-12.4.127-1.x86_64.rpm \
                 cuda-cudart-devel-12-4-12.4.127-1.x86_64.rpm \
                 cuda-cccl-12-4-12.4.127-1.x86_64.rpm \
                 cuda-driver-devel-12-4-12.4.127-1.x86_64.rpm \
                 cuda-cuobjdump-12-4-12.4.127-1.x86_64.rpm \
                 cuda-cuxxfilt-12-4-12.4.127-1.x86_64.rpm \
                 cuda-nvprune-12-4-12.4.127-1.x86_64.rpm \
                 cuda-profiler-api-12-4-12.4.127-1.x86_64.rpm \
                 cuda-toolkit-12-4-config-common-12.4.127-1.noarch.rpm; do
          dl "$CUDA/$p" "$p"
        done
        wait
        echo "Downloaded $(ls rpms/all/*.rpm | wc -l) RPMs"
        du -sh rpms/all

    - name: Run install & tests inside centos:7
      run: |
        docker run --rm -v "$PWD:/work" centos7-test bash /work/.github/workflows/test_inside.sh
