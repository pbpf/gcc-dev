name: Test GCC 11 offline install (CentOS 7)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Build centos:7 test image with vault repos
      run: |
        echo "FROM centos:7" > Dockerfile.test
        echo "RUN sed -i -e 's|^mirrorlist=|#mirrorlist=|' -e 's|^#baseurl=http://mirror.centos.org/centos|baseurl=https://vault.centos.org/centos|' /etc/yum.repos.d/CentOS-Base.repo && yum install -y which wget glibc-devel glibc-headers kernel-headers" >> Dockerfile.test
        docker build -t centos7-test -f Dockerfile.test .

    - name: Download RPMs from CentOS vault
      run: |
        mkdir -p rpms/all
        BASE="https://vault.centos.org/7.9.2009"
        SCL="$BASE/sclo/x86_64/rh/Packages"
        OS="$BASE/os/x86_64/Packages"
        EX="$BASE/extras/x86_64/Packages"

        curl -sL "$BASE/sclo/x86_64/rh/repodata/repomd.xml" -o /dev/null || exit 1

        for pkg in \
          scl-utils-20130529-19.el7.x86_64.rpm \
          scl-utils-build-20130529-19.el7.x86_64.rpm \
          gmp-6.0.0-15.el7.x86_64.rpm \
          mpfr-3.1.1-4.el7.x86_64.rpm \
          libmpc-1.0.1-3.el7.x86_64.rpm \
          make-3.82-24.el7.x86_64.rpm; do
          curl -sL "$OS/$pkg" -o "rpms/all/$pkg" &
        done
        for pkg in \
          centos-release-scl-2-3.el7.centos.noarch.rpm \
          centos-release-scl-rh-2-3.el7.centos.noarch.rpm; do
          curl -sL "$EX/$pkg" -o "rpms/all/$pkg" &
        done
        for pkg in \
          devtoolset-11-runtime-11.1-2.el7.x86_64.rpm \
          devtoolset-11-binutils-2.36.1-1.el7.2.x86_64.rpm \
          devtoolset-11-gcc-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libstdc++-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-gcc-c++-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-make-4.3-1.el7.x86_64.rpm \
          libasan6-11.2.1-9.1.el7.x86_64.rpm \
          libubsan1-11.2.1-9.1.el7.x86_64.rpm \
          liblsan-11.2.1-9.1.el7.x86_64.rpm \
          libtsan-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libasan-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libubsan-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-liblsan-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libtsan-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libatomic-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libitm-devel-11.2.1-9.1.el7.x86_64.rpm \
          devtoolset-11-libquadmath-devel-11.2.1-9.1.el7.x86_64.rpm; do
          curl -sL "$SCL/d/$pkg" -o "rpms/all/$pkg" &
        done
        wait
        echo "Downloaded $(ls rpms/all/*.rpm | wc -l) RPMs"
        du -sh rpms/all

    - name: Run install & tests inside centos:7
      run: |
        docker run --rm -v "$PWD:/work" centos7-test bash /work/.github/workflows/test_inside.sh
